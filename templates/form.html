<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Projeto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topo">
        <h1 class="titulo-topo">Registre o Projeto</h1>
    </header>

    <form action="/salvar-projeto" method="POST" id="form1" enctype="multipart/form-data">
        <div>
            <label for="lider_executante">Líder Executante</label><br>
            <input type="text" id="lider_executante" name="lider_executante" class="caixa" required>
        </div>

        <div>
            <label for="titulo">Título</label><br>
            <input type="text" id="titulo" name="titulo" class="caixa" required>
        </div>

        <div>
            <label>Coordenação</label><br>
            <input type="checkbox" id="coord_equipamentos" name="coordenacao[]" value="equipamentos">
            <label for="coord_equipamentos">Equipamentos</label>
            
            <input type="checkbox" id="coord_preditiva" name="coordenacao[]" value="preditiva">
            <label for="coord_preditiva">Preditiva</label>
            
            <input type="checkbox" id="coord_sistemas" name="coordenacao[]" value="sistemas">
            <label for="coord_sistemas">Sistemas</label>
        </div>

        <div>
            <label for="gerencia_geral">Gerência Geral (GG)</label><br>
            <input type="text" id="gerencia_geral" name="gerencia_geral" class="caixa">
        </div>

        <div>
            <label for="gerencia">Gerência (G)</label><br>
            <input type="text" id="gerencia" name="gerencia" class="caixa">
        </div>

        <div>
            <label for="modalidade">Modalidade</label><br>
            <select id="modalidade" name="modalidade" autocomplete="off" required>
                <option value="" disabled selected hidden>Selecione</option>
                <option value="Análise de Circuito de Motores">Análise de Circuito de Motores</option>
                <option value="Análise de Vibrações">Análise de Vibrações</option>
                <option value="Elétrica">Elétrica</option>
                <option value="Hidráulica e Pneumática">Hidráulica e Pneumática</option>
                <option value="Mecânica">Mecânica</option>
                <option value="Materias">Materias</option>
                <option value="Sistemas">Sistemas</option>
                <option value="Termografia">Termografia</option>
            </select>
        </div>

        <div>
            <label for="tipo-de-atendimento">Tipo de Atendimento</label><br>
             <select id="tipo-de-atendimento" name="tipo_atendimento" autocomplete="off" required>
                <option value="" disabled selected hidden>Selecione</option>
                <option value="analise-tecnica">Análise Técnica</option>
                <option value="emergencial">Atendimento Emergencial (Corretiva)</option>
                <option value="programado">Manutenção Programada (Rotina)</option>
                <option value="suporte-operacional">Suporte / Apoio Operacional</option>
                <option value="calibracao-afericao">Calibração / Aferição de Instrumentos</option>
                <option value="fiscalizacao-inspecao">Fiscalização / Inspeção de Segurança</option>
            </select>
        </div>

        <div>
            <label for="origem_demanda">Origem da Demanda</label><br>
            <input type="text" id="origem_demanda" name="origem_demanda" class="caixa">
        </div>

        <div>
            <label for="solicitante_responsavel">Solicitante Responsável</label><br>
            <input type="text" id="solicitante_responsavel" name="solicitante_responsavel" class="caixa">
        </div>

        <div>
            <label for="justificativa">Justificativa</label><br>
            <input type="text" id="justificativa" name="justificativa" class="caixa">
        </div>

        <div>
            <label for="pessoas_adicionais">Pessoas adicionais</label><br>
            <input type="text" id="pessoas_adicionais" name="pessoas_adicionais" class="caixa">
        </div>

        <div>
            <label for="enfoque">Enfoque</label><br>
            <select id="enfoque" name="enfoque" autocomplete="off" required>
                <option value="" disabled selected hidden>Selecione</option>
                <option value="Melhoria">Melhoria / Modificação de Projeto</option>
                <option value="Confiabilidade">Confiabilidade (Aumento de MTBF)</option>
                <option value="Mantenabilidade">Mantenabilidade (Redução de MTTR)</option>
                <option value="Custos">Otimização de Custos</option>
                <option value="SSMA">Segurança, Saúde e Meio Ambiente (SSMA)</option>
                <option value="Performance">Performance / Eliminação de Gargalo</option>
            </select>
        </div>

        <div>
            <label for="prioridade">Prioridade</label><br>
            <select id="prioridade" name="prioridade" autocomplete="off" required>
                <option value="" disabled selected hidden>Selecione</option>
                <option value="P0">P0</option>
                <option value="P1">P1</option>
                <option value="P2">P2</option>
                <option value="P3">P3</option>
                <option value="P4">P4</option>
            </select>
        </div>

        <div>
            <label for="status">Status</label><br>
            <select name="status" id="status" required>
                <option value="" disabled selected hidden>Selecione</option>
                <option value="em-andamento">Em Andamento</option>
                <option value="concluido">Concluído</option>
                <option value="cancelado">Cancelado</option>
                <option value="paralizado">Paralizado</option>
            </select>
        </div>

        <div>
            <label for="data-inicial">Data Inicial</label><br>
            <input type="date" id="data-inicial" name="data_inicial" autocomplete="off" required>
        </div>

        <div>
            <label for="prazo-estimado">Prazo Estimado</label><br>
            <input type="date" id="prazo-estimado" name="prazo_estimado" autocomplete="off" required>
        </div>

        <div>
            <label for="anexo">Anexos</label><br>
            <input type="file" id="anexo" name="anexo">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Salvar Projeto</button>
        </div>
    </form>
</body>
</html>
