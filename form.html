<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Projeto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topo">
        <h1 class="titulo-topo">Registre o Projeto</h1>
    </header>

    <form action="" id="form1">
        <div>
            <label for="">Líder Executante</label><br>
            <input type="text" class="caixa">
        </div>

        <div>
            <label for="">Título</label><br>
            <input type="text" class="caixa">
        </div>

        <div>
            <label>Coordenação</label><br>
            <input type="checkbox" value="equipamentos">
            <label for="">Equipamentos</label>
            <input type="checkbox" value="preditiva">
            <label for="">Preditiva</label>
            <input type="checkbox" value="sistemas">
            <label for="">Sistemas</label>
        </div>

        <div>
            <label for="">Gerência Geral (GG)</label><br>
            <input type="text" class="caixa">
        </div>

        <div>
            <label for="">Gerência (G)</label><br>
            <input type="text" class="caixa">
        </div>

        <div>
            <label for="">Modalidade</label>
        </div>

        <div>
            <label for="">Tipo de Atendimento</label>
        </div>

        <div>
            <label for=""> Origem da Demanda</label>
        </div>

        <div>
            <label for=""> Solicitante Responsável</label>
        </div>

        <div>
            <label for="">Justificativa</label><br>
            <input type="text" class="caixa">
        </div>

        <div>
            <label for="">Pessoas adicionais</label>
        </div>

        <div>
            <label for="">Enfoque</label>
        </div>

        <div>
            <label for="">Prioridade</label><br>
            <select id="prioridade" name="prioridade" autocomplete="off" required>
                <option value="" disabled selected hidden>Selecione</option>
                <option value="P0">P0</option>
                <option value="P1">P1</option>
                <option value="P2">P2</option>
                <option value="P3">P3</option>
                <option value="P4">P4</option>
            </select>
        </div>

        <div>
            <label for="">Status</label><br>
            <select name="" id="">
                <option value="" disabled selected hidden>Selecione</option>
                <option value="em-andamento">Em Andamento</option>
                <option value="concluido">Concluído</option>
                <option value="cancelado">Cancelado</option>
                <option value="paralizado">Paralizado</option>
            </select>
        </div>

        <div>
            <label for="">Data Inicial</label><br>
            <input type="date" id="data-inicial" name="data-inicial" autocomplete="off" required>
        </div>

        <div>
            <label for="">Prazo Estimado</label><br>
            <input type="date" id="data-inicial" name="data-inicial" autocomplete="off" required>
        </div>

        <div>
            <label for="">Anexos</label><br>
            <input type="file">
        </div>
    </form>
</body>
</html>
